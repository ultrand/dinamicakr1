# Uso local: `docker compose up --build`
# Depois acesse http://localhost:3001 (participante + admin na mesma origem).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dinamica
      POSTGRES_PASSWORD: dinamica
      POSTGRES_DB: dinamica
    ports:
      - "5432:5432"
    volumes:
      - dinamica_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dinamica -d dinamica"]
      interval: 3s
      timeout: 5s
      retries: 10

  web:
    build: .
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://dinamica:dinamica@db:5432/dinamica
      ADMIN_TOKEN: ${ADMIN_TOKEN:-troque-este-token-em-producao}
      PORT: "3001"
      PUBLIC_URL: http://localhost:3001
      CORS_ORIGINS: "*"
    depends_on:
      db:
        condition: service_healthy

volumes:
  dinamica_pg:
